Name: Send Daily Lesson

on:
  schedule:
    # Runs every day at 12:00 AM UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Manual trigger for testing

jobs:
  send-lesson:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install axios

      - name: Send daily lesson
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          node - << 'EOF'
          const axios = require('axios');
          const fs = require('fs');
          
          // Read lessons and sent lessons tracking
          const lessonsData = JSON.parse(fs.readFileSync('lessons.json', 'utf8'));
          let sentData = {};
          
          if (fs.existsSync('sent-lessons.json')) {
            sentData = JSON.parse(fs.readFileSync('sent-lessons.json', 'utf8'));
          }
          
          const lessons = lessonsData.lessons || [];
          const sentLessons = sentData.sent || [];
          
          // Get unsent lessons
          const unsentLessons = lessons.filter(lesson => !sentLessons.includes(lesson));
          
          // If all lessons have been sent, reset the cycle
          if (unsentLessons.length === 0) {
            sentData.sent = [];
            console.log('All lessons sent! Resetting cycle...');
          }
          
          // Pick a random unsent lesson
          const availableLessons = unsentLessons.length > 0 ? unsentLessons : lessons;
          const selectedLesson = availableLessons[Math.floor(Math.random() * availableLessons.length)];
          
          // Mark as sent
          if (!sentData.sent) sentData.sent = [];
          sentData.sent.push(selectedLesson);
          
          // Send email via SendGrid
          const sendgridApiKey = process.env.SENDGRID_API_KEY;
          const recipientEmail = process.env.RECIPIENT_EMAIL;
          
          const emailPayload = {
            personalizations: [
              {
                to: [{ email: recipientEmail }],
                subject: 'Your Daily Lesson'
              }
            ],
            from: { email: 'noreply@dailylesson.app', name: 'Daily Lesson' },
            content: [
              {
                type: 'text/html',
                value: `
                  <div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
                    <h2 style="color: #333;">📚 Your Daily Lesson</h2>
                    <div style="background-color: #f5f5f5; padding: 20px; border-left: 4px solid #007bff; margin: 20px 0;">
                      <p style="font-size: 16px; line-height: 1.6; color: #333; margin: 0;">
                        \${selectedLesson}
                      </p>
                    </div>
                    <p style="color: #666; font-size: 14px; margin-top: 20px;">
                      Lesson \${sentData.sent.length} of \${lessons.length}
                    </p>
                  </div>
                `
              }
            ]
          };
          
          axios.post('https://api.sendgrid.com/v3/mail/send', emailPayload, {
            headers: {
              'Authorization': `Bearer \${sendgridApiKey}`,
              'Content-Type': 'application/json'
            }
          })
          .then(() => {
            console.log('Email sent successfully!');
            // Save progress
            fs.writeFileSync('sent-lessons.json', JSON.stringify(sentData, null, 2));
            console.log(`Progress saved: \${sentData.sent.length}/\${lessons.length} lessons sent`);
          })
          .catch(error => {
            console.error('Error sending email:', error.response?.data || error.message);
            process.exit(1);
          });
          EOF

      - name: Commit progress
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Daily Lesson Bot"
          git add sent-lessons.json
          git commit -m "Update lesson progress - \$(date)" || echo "No changes to commit"
          git push
